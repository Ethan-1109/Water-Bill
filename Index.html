<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Billing Statement System</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eceeec;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #1c1f1e;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border: 1px solid #d8dbd9;
      border-top: 4px solid #2f6f62;
    }

    .card-inner {
      padding: 28px 28px 32px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b716f;
    }

    .title {
      margin: 0 0 22px;
      font-size: 20px;
      font-weight: 700;
      color: #1c1f1e;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #6b716f;
    }

    input,
    select {
      width: 100%;
      padding: 8px 2px;
      font-size: 14px;
      font-family: inherit;
      color: #1c1f1e;
      background: transparent;
      border: none;
      border-bottom: 1px solid #c3c7c5;
      border-radius: 0;
    }

    input:focus,
    select:focus {
      outline: none;
      border-bottom: 1px solid #2f6f62;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      flex: 1;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ffffff;
      background: #2f6f62;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }

    button:hover {
      background: #24564c;
    }

    .btn-secondary {
      background: transparent;
      color: #2f6f62;
      border: 1px solid #2f6f62;
    }

    .btn-secondary:hover {
      background: #eef4f2;
    }

    .counter {
      margin: 16px 0 0;
      font-size: 12px;
      font-family: "Courier New", Courier, monospace;
      color: #6b716f;
    }

    .counter span {
      color: #2f6f62;
      font-weight: 700;
    }

    .error {
      margin: 8px 0 0;
      font-size: 12px;
      font-weight: 600;
      color: #b3261e;
      min-height: 14px;
    }

    .receipt {
      margin-top: 16px;
      padding: 14px 0;
      border-top: 1px solid #1c1f1e;
      border-bottom: 1px solid #1c1f1e;
      font-family: "Courier New", Courier, monospace;
      font-size: 12.5px;
      line-height: 1.5;
      color: #1c1f1e;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 18px;
    }

    .receipt:empty {
      border: none;
      padding: 0;
    }
  </style>
</head>
<body>

  <main class="card">
    <div class="card-inner">
      <p class="eyebrow">Local Water District</p>
      <h1 class="title">Water Billing Statement</h1>

      <form id="billing-form">
        <div class="field">
          <label for="customerName">Customer Name</label>
          <input type="text" id="customerName" />
        </div>

        <div class="field">
          <label for="waterConsumption">Water Consumption (Cubic Meter)</label>
          <input type="number" id="waterConsumption" min="0" />
        </div>

        <div class="field">
          <label for="customerType">Customer Type</label>
          <select id="customerType">
            <option value="Regular">Regular</option>
            <option value="Senior Citizen">Senior Citizen</option>
            <option value="Solo Parent">Solo Parent</option>
          </select>
        </div>

        <div class="button-row">
          <button type="submit" id="generateBtn">Generate Bill</button>
          <button type="button" id="resetBtn" class="btn-secondary">Reset</button>
        </div>
      </form>

      <p class="counter">Transactions Processed : <span id="transactionCount">0</span></p>

      <p id="errorMessage" class="error"></p>

      <pre id="billOutput" class="receipt"></pre>
    </div>
  </main>

  <script>
    // =====================================================================
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    // (You get this after deploying Code.gs as a Web App. It looks like:
    //  "https://script.google.com/macros/s/AKfycb.........../exec")
    // =====================================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOrL_CQLcdgAgRIp2D0PYFUx10UdTnhsNyRl47ILMZtmFr9MjatpsEGEMGQTO5ed2GHw/exec";
    // =====================================================================


    // ---- DOM references ----
    const form = document.getElementById("billing-form");
    const customerNameInput = document.getElementById("customerName");
    const waterConsumptionInput = document.getElementById("waterConsumption");
    const customerTypeSelect = document.getElementById("customerType");
    const transactionCountEl = document.getElementById("transactionCount");
    const errorMessageEl = document.getElementById("errorMessage");
    const billOutputEl = document.getElementById("billOutput");
    const resetBtn = document.getElementById("resetBtn");

    // ---- State ----
    let transactionsProcessed = 0;

    form.addEventListener("submit", function (event) {
      event.preventDefault(); // stop the page from reloading
      errorMessageEl.textContent = "";

      const customerName = customerNameInput.value.trim();
      const consumption = parseFloat(waterConsumptionInput.value);
      const customerType = customerTypeSelect.value;

      // ---- Input validation ----
      if (customerName === "") {
        errorMessageEl.textContent = "Please enter the customer's name.";
        return;
      }

      if (isNaN(consumption) || consumption <= 0) {
        errorMessageEl.textContent = "Please enter a valid water consumption greater than 0.";
        return;
      }

      // ---- Determine rate per cubic meter (if / else if) ----
      let rate;
      if (consumption >= 1 && consumption <= 20) {
        rate = 25.0;
      } else if (consumption >= 21 && consumption <= 40) {
        rate = 35.0;
      } else if (consumption >= 41 && consumption <= 60) {
        rate = 45.0;
      } else {
        rate = 60.0; // above 60
      }

      // ---- Determine discount rate (switch) ----
      let discountRate;
      switch (customerType) {
        case "Senior Citizen":
          discountRate = 0.25;
          break;
        case "Solo Parent":
          discountRate = 0.15;
          break;
        case "Regular":
        default:
          discountRate = 0;
          break;
      }

      // ---- Computations ----
      const amount = consumption * rate;
      const discount = amount * discountRate;
      const total = amount - discount;

      // ---- Loop: build the receipt separator line ----
      let separator = "";
      for (let i = 0; i < 38; i++) {
        separator += "=";
      }

      // ---- Update transaction counter ----
      transactionsProcessed++;
      transactionCountEl.textContent = transactionsProcessed;

      // ---- Build and display the receipt using the DOM ----
      const receipt =
        `${separator}\n` +
        `          WATER BILLING STATEMENT\n` +
        `${separator}\n` +
        `Customer Name : ${customerName}\n` +
        `Customer Type : ${customerType}\n` +
        `Water Usage   : ${consumption} cu.m\n` +
        `Rate          : \u20B1${rate.toFixed(2)} / cu.m\n` +
        `${separator}\n` +
        `Amount        : \u20B1${amount.toFixed(2)}\n` +
        `Discount      : \u20B1${discount.toFixed(2)}\n` +
        `${separator}\n` +
        `TOTAL BILL    : \u20B1${total.toFixed(2)}\n` +
        `${separator}`;

      billOutputEl.textContent = receipt;

      // ---- Record the transaction in Google Sheets ----
      recordTransaction({
        customerName: customerName,
        consumption: consumption,
        customerType: customerType,
        rate: rate,
        amount: amount,
        discount: discount,
        total: total
      });
    });

    // ---- Reset button: clears the form and the receipt, but leaves ----
    // ---- transactionsProcessed / transactionCountEl untouched ----
    resetBtn.addEventListener("click", function () {
      form.reset();
      errorMessageEl.textContent = "";
      billOutputEl.textContent = "";
    });

    // Sends the transaction to the Google Apps Script Web App so it gets
    // appended as a new row in the connected Google Sheet.
    function recordTransaction(data) {
      if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
        console.warn("Google Apps Script URL not set yet. Skipping save to Google Sheets.");
        return;
      }

      // mode: "no-cors" + text/plain avoids CORS errors with Apps Script.
      // We won't get a readable response back, but the row still gets saved.
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(data)
      })
        .then(function () {
          console.log("Transaction sent to Google Sheets.");
        })
        .catch(function (error) {
          console.error("Could not reach Google Sheets:", error);
        });
    }
  </script>
</body>
</html>
